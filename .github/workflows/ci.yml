# Continuous integration — runs on every PR and on pushes to master.
#
# The fast gate: rustfmt + clippy + the swap engine's tests, the Satchel app
# build + its unit tests, and the UI lint + typecheck/build. Security audits
# live in security.yml (scheduled, non-blocking).
#
# The e2e job runs the full regtest harness (pact/harness/test_runner.py,
# TEST_FRAMEWORK_PLAN Phase 5). Its external binaries live in an actions
# cache keyed on pact/harness/ci/fetch-binaries.sh — bump a pin there to
# rebuild them (cold rebuild ≈ 45 min for the pocx-bitcoind source build;
# warm runs restore in seconds).

name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: Format (rustfmt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: cargo fmt --check (all crates)
        run: |
          cargo fmt --manifest-path pact/Cargo.toml --all --check
          cargo fmt --manifest-path pact-nostr/Cargo.toml --all --check
          cargo fmt --manifest-path satchel/Cargo.toml --all --check
          cargo fmt --manifest-path corkboard/Cargo.toml --all --check
          cargo fmt --manifest-path pact-proto/Cargo.toml --all --check

  engine:
    name: Engine (clippy + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            pact
            pact-nostr
            corkboard
            pact-proto
      - name: System deps
        run: sudo apt-get update && sudo apt-get install -y build-essential pkg-config libssl-dev
      - name: Clippy (deny warnings)
        run: |
          cargo clippy --manifest-path pact/Cargo.toml --workspace --all-targets -- -D warnings
          cargo clippy --manifest-path pact-nostr/Cargo.toml --all-targets -- -D warnings
          cargo clippy --manifest-path corkboard/Cargo.toml --all-targets -- -D warnings
          cargo clippy --manifest-path pact-proto/Cargo.toml --all-targets -- -D warnings
      - name: Test pact workspace (libswap + pactd + cli)
        run: cargo test --manifest-path pact/Cargo.toml --workspace
      - name: Test pact-nostr
        run: cargo test --manifest-path pact-nostr/Cargo.toml
      - name: Test corkboard
        run: cargo test --manifest-path corkboard/Cargo.toml
      - name: Test pact-proto
        run: cargo test --manifest-path pact-proto/Cargo.toml

  app:
    name: Satchel app (clippy + build + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            pact
            satchel
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: satchel/ui/package-lock.json
      - name: Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev \
            libappindicator3-dev patchelf build-essential pkg-config libssl-dev
      # The Satchel crate's generate_context!() validates frontendDist (ui/dist)
      # and the externalBin sidecars at compile time, so both must exist before
      # clippy/test can compile.
      - name: Build UI (ui/dist)
        working-directory: satchel/ui
        run: |
          npm ci
          npm run build
      - name: Build + stage sidecars
        run: |
          cargo build --manifest-path pact/Cargo.toml -p pactd -p pact-cli
          mkdir -p satchel/binaries
          cp pact/target/debug/pactd    satchel/binaries/pactd-x86_64-unknown-linux-gnu
          cp pact/target/debug/pact-cli satchel/binaries/pact-cli-x86_64-unknown-linux-gnu
      - name: Clippy (deny warnings)
        run: cargo clippy --manifest-path satchel/Cargo.toml --all-targets -- -D warnings
      - name: Test Satchel app
        run: cargo test --manifest-path satchel/Cargo.toml

  e2e:
    name: E2E (regtest harness)
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            pact
            corkboard
      - name: System deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake pkgconf libevent-dev libboost-dev \
            libsqlite3-dev libssl-dev protobuf-compiler
      - name: Cache harness binaries
        uses: actions/cache@v4
        with:
          path: pact/harness/bin
          key: harness-bins-${{ runner.os }}-${{ hashFiles('pact/harness/ci/fetch-binaries.sh') }}
      # Unconditional: the script skips per binary already in bin/, so a warm
      # cache is a no-op and a partial one (cancelled run) self-heals.
      - name: Fetch/build harness binaries
        run: bash pact/harness/ci/fetch-binaries.sh
      # The funded-datadir cache (stack.py §2.3) self-invalidates on a node
      # binary fingerprint, so restoring it is always safe; it saves once per
      # binary pin and shaves the funding bringup off every scenario.
      - name: Cache funded datadirs
        uses: actions/cache@v4
        with:
          path: pact/harness/cache
          key: harness-datadirs-${{ runner.os }}-${{ hashFiles('pact/harness/ci/fetch-binaries.sh') }}
      - name: Build workspace (pactd + pact-cli + corkboard)
        run: |
          cargo build --manifest-path pact/Cargo.toml
          cargo build --manifest-path corkboard/Cargo.toml
      - name: Run the e2e suite
        working-directory: pact/harness
        env:
          TMPDIR: ${{ runner.temp }}   # failed-scenario workdirs (pact-*) land here
        run: python3 test_runner.py --skip-build
      - name: Upload failure workdirs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-failure-workdirs
          path: ${{ runner.temp }}/pact-*
          if-no-files-found: ignore

  ui:
    name: UI (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: satchel/ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: satchel/ui/package-lock.json
      - name: Install deps
        run: npm ci
      - name: Lint (eslint — incl. i18next/no-literal-string guard)
        run: npm run lint
      - name: Typecheck + build
        run: npm run build

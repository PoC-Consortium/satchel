<!DOCTYPE html>
<!-- Satchel's frontend entry. The app is a React + Vite + MUI bundle (src/).
     It talks to pactd ONLY through Satchel's Rust `pactd_rpc` bridge (which
     holds the cookie) plus the list_*/save_* Tauri commands — the webview
     never sees the cookie and there is no swap logic here, ever. -->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Satchel — trustless swaps</title>
    <!-- Montserrat: the Phoenix brand font, used for the sidebar logo wordmark.
         (Dev-time CDN load; bundle via @fontsource before go-live for offline.) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e7bd5e"/>
      <stop offset="1" stop-color="#d9a743"/>
    </linearGradient>
    <linearGradient id="flap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d3a142"/>
      <stop offset="1" stop-color="#b9842a"/>
    </linearGradient>
  </defs>

  <!-- carry strap (arc over the bag) -->
  <path d="M166 246 C166 112 346 112 346 246"
        fill="none" stroke="#b9842a" stroke-width="30" stroke-linecap="round"/>

  <!-- bag body -->
  <path d="M150 232 h212 a26 26 0 0 1 26 26 v92 a40 40 0 0 1 -40 40 H164 a40 40 0 0 1 -40 -40 v-92 a26 26 0 0 1 26 -26 z"
        fill="url(#gold)"/>

  <!-- front flap -->
  <path d="M132 224 a24 24 0 0 1 24 -24 h200 a24 24 0 0 1 24 24 v42 a20 20 0 0 1 -20 20 H152 a20 20 0 0 1 -20 -20 z"
        fill="url(#flap)"/>
  <!-- crisp shadow line under the flap -->
  <path d="M138 286 H374" fill="none" stroke="#a8761f" stroke-width="4" opacity="0.55"/>

  <!-- buckle: dark slot + gold pin (reads as a keyhole) -->
  <rect x="228" y="276" width="56" height="46" rx="14" fill="#14171a"/>
  <rect x="246" y="256" width="20" height="52" rx="10" fill="#e7bd5e"/>
</svg>

# Satchel coin templates.
#
# This one file defines the coins Satchel can trade. It is read by BOTH parts of
# the app:
#   * the engine (pactd) reads each coin's `consensus` block — the chain params
#     it needs to verify genesis, build/parse addresses, and derive keys;
#   * Satchel reads each coin's `connection` block (RPC host/port/auth/datadir
#     defaults that pre-fill the setup form) and the `icon`.
#
# Add a NEW coin by copying a [[coin]] block, editing the values, and dropping an
# icon file next to this one. No recompile needed. Restart Satchel to pick it up.
#
# A new coin needs surprisingly little. The node must speak the Bitcoin Core
# JSON-RPC (cookie or rpcuser/rpcpassword); the only consensus values actually
# used are `genesis_hash` (verified against your node) and `bech32_hrp` (swap
# addresses). The other consensus fields below — header_format, magic, the
# legacy prefixes — are OPTIONAL and currently unused at runtime; they're kept
# for future light/Electrum support (header_format would then need to be
# "bitcoin" or "pocx", with exotic headers like AuxPoW needing an engine
# change). So a minimal coin can be just:
#     [coin.regtest]
#     consensus  = { genesis_hash = "…", bech32_hrp = "…" }
#     connection = { rpc_host = "127.0.0.1", rpc_port = …, auth_method = "cookie", datadir = "…" }
#
# Notes:
#   * The two built-in coins (btcx, btc) are also defined in the engine in code
#     and are authoritative — the engine IGNORES the consensus block here for
#     them (so this file can never redirect btc/btcx). Their full blocks below
#     are a worked example for adding your own coin.
#   * `genesis_hash` is the 32-byte block hash in display (big-endian) order;
#     `magic` (if given) is 4-byte hex. `datadir` understands ~, %LOCALAPPDATA%,
#     %APPDATA%, and %NODEDIR%/<Name> (the node's per-OS default data dir:
#     %LOCALAPPDATA%\<Name> on Windows, ~/Library/Application Support/<Name> on
#     macOS, ~/.<name> on Linux). `connection.rpc_port` regtest values match the
#     playground nodes.

schema_version = 1

# ---------------------------------------------------------------------------
[[coin]]
coin_id = "btcx"
display_name = "Bitcoin PoCX"
symbol = "BTCX"
decimals = 8
bip32_coin_type = 1347371864  # 0x504F4358 = ASCII "POCX"
target_spacing_secs = 120
icon = "btcx.svg"
capabilities = { cltv = true, segwit_v0 = true, taproot = true }

  [coin.mainnet]
  consensus  = { header_format = "pocx", magic = "a73c915e", default_p2p_port = 8338, p2pkh_prefix = 85, p2sh_prefix = 90, wif_prefix = 128, bech32_hrp = "pocx", genesis_hash = "6ab422073e327d42a0e5dfaaa26564324ddb225e53c64da89283cd4e3dfb7ac6" }
  connection = { rpc_host = "127.0.0.1", rpc_port = 8332, auth_method = "cookie", datadir = "%NODEDIR%/Bitcoin-PoCX", cookie_subpath = ".cookie", wallet = "" }

  [coin.testnet]
  consensus  = { header_format = "pocx", magic = "6df248b4", default_p2p_port = 18338, p2pkh_prefix = 127, p2sh_prefix = 132, wif_prefix = 239, bech32_hrp = "tpocx", genesis_hash = "181c51a172fe20c203e463f6f203b7d9be388fa0f1282e507192f94d24a57e81" }
  connection = { rpc_host = "127.0.0.1", rpc_port = 18332, auth_method = "cookie", datadir = "%NODEDIR%/Bitcoin-PoCX", cookie_subpath = "testnet/.cookie", wallet = "" }

  # TODO(nodeless): add `electrum = [...]` defaults to mainnet/testnet once the
  # project's public PoCX Electrum servers are live (mainnet needs >= 2).
  [coin.regtest]
  consensus  = { header_format = "pocx", magic = "fabfb5da", default_p2p_port = 18444, p2pkh_prefix = 111, p2sh_prefix = 196, wif_prefix = 239, bech32_hrp = "rpocx", genesis_hash = "2a98a52253aeff06093948b00568d380b7634621bc606403127973c9acbbfde0" }
  connection = { rpc_host = "127.0.0.1", rpc_port = 19443, auth_method = "cookie", datadir = "%NODEDIR%/Bitcoin-PoCX", cookie_subpath = "regtest/.cookie", wallet = "", electrum = ["tcp://127.0.0.1:19750"] }

# ---------------------------------------------------------------------------
[[coin]]
coin_id = "btc"
display_name = "Bitcoin"
symbol = "BTC"
decimals = 8
bip32_coin_type = 0
target_spacing_secs = 600
icon = "btc.svg"
capabilities = { cltv = true, segwit_v0 = true, taproot = true }

  [coin.mainnet]
  consensus  = { header_format = "bitcoin", magic = "f9beb4d9", default_p2p_port = 8333, p2pkh_prefix = 0, p2sh_prefix = 5, wif_prefix = 128, bech32_hrp = "bc", genesis_hash = "000000000019d6689c085ae165831e934ff763ae46a2a6c172b3f1b60a8ce26f" }
  # Nodeless default fleet (#102) — with the active-set pool (#98) only the
  # wallet home + 2 views hold connections; the rest are cold backups, so a
  # long list adds resilience, never latency. All verified live 2026-07-06
  # via `cargo run -p libswap --example electrum_probe -- btc --all` (TLS +
  # protocol 1.4+ + BTC genesis 00000000…). Re-run that gate before editing.
  connection = { rpc_host = "127.0.0.1", rpc_port = 8332, auth_method = "cookie", datadir = "%NODEDIR%/Bitcoin", cookie_subpath = ".cookie", wallet = "", electrum = ["ssl://electrum.blockstream.info:50002", "ssl://electrum.emzy.de:50002", "ssl://electrum.bitaroo.net:50002", "ssl://fortress.qtornado.com:443", "ssl://bitcoin.lu.ke:50002", "ssl://electrum.hodlister.co:50002", "ssl://electrum3.hodlister.co:50002", "ssl://e.keff.org:50002", "ssl://2ex.digitaleveryware.com:50002", "ssl://bitcoin.aranguren.org:50002", "ssl://guichet.centure.cc:50002", "ssl://electrum.acinq.co:50002", "ssl://electrum1.bluewallet.io:443"] }

  [coin.testnet]
  consensus  = { header_format = "bitcoin", magic = "0b110907", default_p2p_port = 18333, p2pkh_prefix = 111, p2sh_prefix = 196, wif_prefix = 239, bech32_hrp = "tb", genesis_hash = "000000000933ea01ad0ee984209779baaec3ced90fa3f408719526f8d77f4943" }
  connection = { rpc_host = "127.0.0.1", rpc_port = 18332, auth_method = "cookie", datadir = "%NODEDIR%/Bitcoin", cookie_subpath = "testnet3/.cookie", wallet = "", electrum = ["ssl://electrum.blockstream.info:60002"] }

  [coin.regtest]
  consensus  = { header_format = "bitcoin", magic = "fabfb5da", default_p2p_port = 18444, p2pkh_prefix = 111, p2sh_prefix = 196, wif_prefix = 239, bech32_hrp = "bcrt", genesis_hash = "0f9188f13cb7b2c71f2a335e3a4fc328bf5beb436012afca590b1a11466e2206" }
  connection = { rpc_host = "127.0.0.1", rpc_port = 19543, auth_method = "cookie", datadir = "%NODEDIR%/Bitcoin", cookie_subpath = "regtest/.cookie", wallet = "", electrum = ["tcp://127.0.0.1:19760"] }

# ---------------------------------------------------------------------------
# Litecoin — the first real third coin (not built-in; lives purely as data).
# A Bitcoin Core fork with SegWit v0 + CLTV (→ classic HTLC swaps) AND Taproot
# active since 2022 (→ the v2 adaptor path too), so btc<->ltc and btcx<->ltc
# both resolve. Values from litecoin-project/litecoin src/chainparams.cpp.
# Litecoin block ids are sha256d of the 80-byte header (Scrypt is PoW only), so
# header_format = "bitcoin" hashes its genesis correctly.
[[coin]]
coin_id = "ltc"
display_name = "Litecoin"
symbol = "LTC"
decimals = 8
bip32_coin_type = 2          # SLIP-44
target_spacing_secs = 150    # 2.5 min
icon = "ltc.svg"
capabilities = { cltv = true, segwit_v0 = true, taproot = true }

  [coin.mainnet]
  # litecoind's wallet/relay min fee is ~10 sat/vB (Bitcoin's is 1), exposed by
  # no RPC, so a spend below it is rejected (-6). Floor funding/spends here.
  min_feerate_sat_vb = 10
  consensus  = { header_format = "bitcoin", magic = "fbc0b6db", default_p2p_port = 9333, p2pkh_prefix = 48, p2sh_prefix = 5, wif_prefix = 176, bech32_hrp = "ltc", genesis_hash = "12a765e31ffd4059bada1e25190f6e98c99d9714d334efa41a195a7e7e04bfe2" }
  # Nodeless default fleet (#102) — active-set pool (#98): home + 2 views
  # live, the rest cold backup, so a dead entry costs nothing. All 7 verified
  # live 2026-07-06 via `cargo run -p libswap --example electrum_probe -- ltc
  # --all` (verify_chain: TLS + protocol 1.4+ + genesis 12a765e3…) — including
  # electrum-ltc.bysh.me, the flaky server behind #98, kept at the tail.
  # Re-run that gate before editing. electrum-ltc.org is pooler's (Litecoin
  # core dev) reference server.
  connection = { rpc_host = "127.0.0.1", rpc_port = 9332, auth_method = "cookie", datadir = "%NODEDIR%/Litecoin", cookie_subpath = ".cookie", wallet = "", electrum = ["ssl://backup.electrum-ltc.org:443", "ssl://electrum.ltc.xurious.com:50002", "ssl://electrum1.cipig.net:20063", "ssl://electrum2.cipig.net:20063", "ssl://ltc.rentonisk.com:50002", "ssl://electrum-ltc.petrkr.net:60002", "ssl://electrum-ltc.bysh.me:50002"] }

  [coin.testnet]
  min_feerate_sat_vb = 10
  consensus  = { header_format = "bitcoin", magic = "fdd2c8f1", default_p2p_port = 19335, p2pkh_prefix = 111, p2sh_prefix = 196, wif_prefix = 239, bech32_hrp = "tltc", genesis_hash = "4966625a4b2851d9fdee139e56211a0d88575f59ed816ff5e6a63deb4e3e29a0" }
  connection = { rpc_host = "127.0.0.1", rpc_port = 19332, auth_method = "cookie", datadir = "%NODEDIR%/Litecoin", cookie_subpath = "testnet4/.cookie", wallet = "" }

  [coin.regtest]
  min_feerate_sat_vb = 10
  consensus  = { header_format = "bitcoin", magic = "fabfb5da", default_p2p_port = 19444, p2pkh_prefix = 111, p2sh_prefix = 196, wif_prefix = 239, bech32_hrp = "rltc", genesis_hash = "530827f38f93b43ed12af0b3ad25a288dc02ed74d6d7857862df51fc56c416f9" }
  connection = { rpc_host = "127.0.0.1", rpc_port = 19643, auth_method = "cookie", datadir = "%NODEDIR%/Litecoin", cookie_subpath = "regtest/.cookie", wallet = "" }
